post:
    tags:
        - Authentication
    summary: Validate login and return user credentials
    description: Incoming request to validate a login
    x-eov-operation-id: validateLogin
    x-eov-operation-handler: auth
    requestBody:
        description: User login credentials
        required: true
        content:
            application/json:
                schema:
                    type: object
                    required:
                        - username
                        - password
                    properties:
                        username:
                            type: string
                            description: The user's username
                        password:
                            type: string
                            format: password
                            description: The user's password
    responses:
        200:
            description: Login successful
            content:
                application/json:
                    schema:
                        type: object
                        properties:
                            id:
                                type: integer
                            username:
                                type: string
                            token:
                                type: string
                                description: Authentication token
        401:
            description: Invalid credentials
            content:
                application/json:
                    schema:
                        type: object
                        properties:
                            message:
                                type: string
