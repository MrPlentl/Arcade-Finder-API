get:
    tags:
        - Games
    summary: Get a list of registered Video Games
    description: The collection of video games
    x-eov-operation-id: getGamesTest
    x-eov-operation-handler: game
    responses:
        200:
            description: Successful operation
            content:
                application/json:
                    schema:
                        type: array
        400:
            description: Invalid tag value
            content:
                application/json:
                    schema:
                        type: object
                        properties:
                            message:
                                type: string
                                description: Main error Message
                            errors:
                                type: array
                                description: Error details
        401:
            description: Authentication Failure
            content:
                application/json:
                    schema:
                        type: object
                        properties:
                            error:
                                type: string
                                description: Error Message
        403:
            description: Authentication Failure
            content:
                application/json:
                    schema:
                        type: object
                        properties:
                            error:
                                type: string
                                description: Error Message
