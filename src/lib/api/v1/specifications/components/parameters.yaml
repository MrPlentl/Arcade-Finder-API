Games:
    GameId:
        - in: path
          name: gameId
          required: true
          description: ID of game to return
          schema:
            anyOf:
              - type: integer
                format: int64
                maximum: 10000
                minimum: 1
              - type: string
                description: The slug of the game to return
    SortBy:
        name: sortBy
        in: query
        description: Sort values that need to be considered for filter
        required: false
        schema:
            type: string
            default: id
            enum:
                - id
                - name
                - year
    Search:
        name: search
        in: query
        description: Search for games
        required: false
        schema:
            type: string
Movies:
    MovieId:
        - in: path
          name: movieId
          required: true
          description: ID of movie to return
          schema:
            anyOf:
              - type: integer
                format: int64
                maximum: 32767
                minimum: 1
              - type: string
                description: The slug of the movie to return
    SortBy:
        name: sortBy
        description: Sort values that need to be considered for filter
        required: false
        schema:
            type: string
            default: id
            enum:
                - id
                - name
                - year
Shows:
    ShowId:
        - in: path
          name: showId
          required: true
          description: ID of show to work on
          schema:
              type: integer
              format: int64
              maximum: 32767
              minimum: 1
    SortBy:
        name: sortBy
        description: Sort values that need to be considered for filter
        required: false
        schema:
            type: string
            default: id
            enum:
                - id
                - name
                - year
Venues:
    Zip:
        name: zip
        in: query
        description: Zip code to search near
        required: false
        schema:
            type: integer
    Name:
        name: name
        in: query
        description: Name of the venue
        required: false
        schema:
            type: string
    Distance:
        name: distance
        in: query
        description: Search radius distance
        required: false
        schema:
            type: integer
            minimum: 1
Venue:
    Id:
        - in: path
          name: venueId
          required: true
          description: ID of venue to return
          schema:
              type: integer
              format: int64
              maximum: 10000
              minimum: 1
