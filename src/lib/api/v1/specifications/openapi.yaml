openapi: 3.1.0
info:
  title: Arcade Finder API
  description: |-
    The Arcade Finder API provides a comprehensive set of endpoints to discover, track, and manage arcade venues and their machine inventory.

    Users can search for arcades by location, find specific games (like Pinball, retro cabinets, or modern rhythm games), and contribute by adding new venues, machines, and related media such as video game movies and shows.

    Whether you're looking for a classic Barcade, a family entertainment center, or a hidden local gem, this API powers the search for your next arcade adventure.
  contact:
    email: bplentl@gmail.com
  license:
    name: GPLv3
    url: https://www.gnu.org/licenses/gpl-3.0.en.html
  version: 0.0.61
externalDocs:
  description: Find out more about the Arcade Finder API
  url: http://mrplentl.com
servers:
  - url: /api/v1
    description: All API endpoints are relative to the base URL.
tags:
  - name: Venues
    description: Operations to search and manage Arcade Venues
    externalDocs:
      description: Find more Arcades to add from Google maps
      url: https://maps.app.goo.gl/c9gQJVrmeMdtpw5GA
  - name: Games
    description: Everything about Games
    externalDocs:
      description: Find more Arcade games to add on IGDB
      url: https://www.igdb.com/platforms/arcade/games
  - name: Movies
    description: Everything about Movies
    externalDocs:
      description: Find more movies to add
      url: https://letterboxd.com/pillager/list/video-game-movies/
  - name: Shows
    description: Everything about Shows
  - name: Authentication
    description: Authentication endpoints for various tasks
  - name: Utility
    description: Utility endpoints for various tasks
paths:
  /:
    $ref: "./paths/index.yaml"
  /apikey/{userId}:
    $ref: "./paths/apikey.yaml"
  # Authentication / IAM

  /auth/login:
    $ref: "./paths/login.yaml"
  /auth/register:
    $ref: "./paths/register.yaml"
  /auth/token:
    $ref: "./paths/token.yaml"
  /game/{gameId}:
    $ref: "./paths/game.yaml"
  /games:
    $ref: "./paths/games.yaml"
  /gamesTest:
    $ref: "./paths/gamesTest.yaml"
  /movie/{movieId}:
    $ref: "./paths/movie.yaml"
  /movies:
    $ref: "./paths/movies.yaml"
  /show/{showId}:
    $ref: "./paths/show.yaml"
  /shows:
    $ref: "./paths/shows.yaml"
  /venue/search:
    $ref: "./paths/venue_search.yaml"
  /venue/{venueId}:
    $ref: "./paths/venue.yaml"
